name: "Storybook Preview & Publishing"

on: [push, pull_request]

permissions:
  pull-requests: write
  contents: read

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

      - name: Comment on PR
        if: github.event_name == 'pull_request' && (steps.chromatic.outputs.storybookUrl != '' || steps.chromatic.outputs.buildUrl != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STORYBOOK_URL: ${{ steps.chromatic.outputs.storybookUrl }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🚀 **Storybook Preview Ready!**
          
          You can view the live components for this PR here:
          $STORYBOOK_URL"